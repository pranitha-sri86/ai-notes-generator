{% extends "layout.html" %}

{% block title %}
Profile
{% endblock %}

{% block extra_css %}
<link rel="stylesheet"
      href="{{ url_for('static',
      filename='css/profile.css') }}">
{% endblock %}

{% block content %}

<div class="profile-container">

    <div class="profile-card text-center mb-4">

        <div class="profile-avatar">
            P
        </div>

        <h3 class="mt-3">
            Pranith
        </h3>

        <p>
            pranith@example.com
        </p>

    </div>

    <div class="row g-4 mb-4">

        <div class="col-md-4">

            <div class="stats-box">

                <h2>25</h2>

                <p>Total Notes</p>

            </div>

        </div>

        <div class="col-md-4">

            <div class="stats-box">

                <h2>10</h2>

                <p>Quizzes Taken</p>

            </div>

        </div>

        <div class="col-md-4">

            <div class="stats-box">

                <h2>150</h2>

                <p>Flashcards</p>

            </div>

        </div>

    </div>

    <div class="row">

        <div class="col-lg-6">

            <div class="settings-card">

                <h4 class="mb-3">
                    Update Profile
                </h4>

                <form>

                    <div class="mb-3">

                        <label for="profile-name">Name</label>

                        <input id="profile-name" type="text"
                               class="form-control"
                               value="Pranith"
                               placeholder="Enter your name"
                               title="Full name">

                    </div>

                    <div class="mb-3">

                        <label for="profile-email">Email</label>

                        <input id="profile-email" type="email"
                               class="form-control"
                               value="pranith@example.com"
                               placeholder="name@example.com"
                               title="Email address">

                    </div>

                    <button type="submit" class="btn btn-primary">

                        Save Changes

                    </button>

                </form>

            </div>

        </div>

        <div class="col-lg-6">

            <div class="settings-card">

                <h4 class="mb-3">
                    Change Password
                </h4>

                <form>

                    <div class="mb-3">

                        <label for="current-password">Current Password</label>

                        <input id="current-password" type="password"
                               class="form-control"
                               placeholder="Enter current password"
                               title="Current password">

                    </div>

                    <div class="mb-3">

                        <label for="new-password">New Password</label>

                        <input id="new-password" type="password"
                               class="form-control"
                               placeholder="Enter new password"
                               title="New password">

                    </div>

                    <button type="submit" class="btn btn-danger">

                        Update Password

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
