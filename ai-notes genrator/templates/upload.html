{% extends "layout.html" %}

{% block title %}
Upload Notes
{% endblock %}

{% block extra_css %}
<link rel="stylesheet"
      href="{{ url_for('static',
      filename='css/upload.css') }}">
{% endblock %}

{% block content %}

<div class="upload-container">

    <div class="upload-card">

        <h2 class="text-center mb-4">
            Upload Study Material
        </h2>

         <form id="notesForm"
          method="POST"
         action="{{ url_for('generate_notes') }}"
          enctype="multipart/form-data">
                
              <div id="loadingOverlay"
           class="loading-overlay">

     <div class="loading-content">

        <div class="spinner"></div>

        <h4>Generating AI Notes...</h4>

        <p>Please wait a few seconds.</p>

        </div>

    </div>

    

<div class="mb-3">

    <label class="form-label">
        Select Output Language
    </label>

    <select class="form-select"
            name="language"
            title="Select output language">

        <option value="English">English</option>
        <option value="Hindi">Hindi</option>
        <option value="Marathi">Marathi</option>
        <option value="Tamil">Tamil</option>
        <option value="Telugu">Telugu</option>
        <option value="Kannada">Kannada</option>
        <option value="Bengali">Bengali</option>
        <option value="Gujarati">Gujarati</option>

    </select>

</div>


<div class="mb-3">
    <label class="form-label">
        Notes Title
    </label>

    <input type="text"
           class="form-control"
           name="title"
           placeholder="Enter notes title"
           required>
</div>
            <!-- Drag Drop Area -->

            <label for="fileInput">

                <div class="upload-box">

                    <i class="bi bi-cloud-arrow-up"></i>

                    <h4 class="mt-3">

                        Drag & Drop File Here

                    </h4>

                    <p>

                        PDF or DOCX

                    </p>

                </div>

            </label>

            <input type="file"
                   id="fileInput"
                   name="file"
                   hidden
                   accept=".pdf,.docx">

            <div id="selectedFile"
                 class="mt-3 text-center">
            </div>

            <hr class="my-4">

            <h5 class="mb-3">

                OR Paste Text

            </h5>

            <label for="studyText">Enter or paste your study material:</label>
              <div class="mb-2">

    <button type="button"
            class="btn btn-outline-primary"
            onclick="startVoiceInput()">

        🎤 Start Voice Input

    </button>

</div>
           <textarea
    id="studyText"
    name="study_text"
    class="form-control"
    placeholder="Paste your study text here..."
    title="Study material text area"
    required>
</textarea>  
            <div class="text-center mt-4">

                <button
                    type="submit"
                    class="btn btn-primary btn-lg">

                    Generate Notes

                </button>

            </div>

        </form>

        <!-- Spinner -->

        <div class="spinner-container"
             id="spinner">

            <div class="spinner-border text-primary">
            </div>

            <p class="mt-3">

                AI is generating notes...

            </p>

        </div>

    </div>

</div>

{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static',
filename='js/upload.js') }}"></script>
{% endblock %}
