{% extends "layout.html" %}

{% block title %}
Mock Interview
{% endblock %}

{% block extra_css %}
<link rel="stylesheet"
href="{{ url_for('static',
filename='css/mock_interview.css') }}">
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow-lg p-4">

        <h2 class="text-center mb-4">
            🎤 AI Mock Interview
        </h2>

        <div class="mb-3">

            <label class="form-label">
                Interview Topic
            </label>

            <input type="text"
                   id="topic"
                   class="form-control"
                   placeholder="Example: Python Developer">

        </div>

        <div id="chatBox"
             class="chat-box">
        </div>

        <div class="input-group mt-3">

    <input type="text"
           id="answerInput"
           class="form-control"
           placeholder="Type your answer...">

    <button class="btn btn-primary"
            onclick="sendAnswer()">

        Send

    </button>

    <button class="btn btn-success"
            onclick="startVoiceInput()">

        🎤 Speak

    </button>

</div>

        <button class="btn btn-success mt-3"
                onclick="startInterview()">

            Start Interview

        </button>

    </div>

</div>

{% endblock %}

{% block extra_js %}

<script src="{{ url_for('static',
filename='js/mock_interview.js') }}"></script>

{% endblock %}
