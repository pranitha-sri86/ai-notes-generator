{% extends "layout.html" %}

{% block title %}Quiz{% endblock %}

{% block extra_css %}
<link rel="stylesheet"
      href="{{ url_for('static',
      filename='css/quiz.css') }}">
{% endblock %}

{% block content %}

<div class="quiz-container">

    <h2 class="text-center mb-4">
        AI Quiz
    </h2>

    <!-- Quiz Section -->
    <div id="quizSection">

        <div class="d-flex justify-content-between mb-3">

            <span id="progress">
                Question 1
            </span>

        </div>

        <!-- Question -->
        <div class="question-box mb-4">

            <h4 id="question">
                Loading question...
            </h4>

        </div>

        <!-- Options -->
        <div id="options"
             class="options-container">

        </div>

        <!-- Navigation -->
        <div class="d-flex justify-content-between mt-4">

            <button id="prevBtn"
                    class="btn btn-outline-secondary"
                    onclick="prevQuestion()">

                ← Previous

            </button>

            <button id="nextBtn"
                    class="btn btn-primary"
                    onclick="nextQuestion()">

                Next →

            </button>

        </div>

    </div>

    <!-- Result Box -->
    <div class="result-box"
         id="resultBox"
         hidden>

        <div class="score-circle"
             id="scoreCircle">

            0/0

        </div>

        <h3 class="mt-3"
            id="scoreMessage">
        </h3>

        <p class="text-muted"
           id="scoreText">
        </p>

        <p id="feedback"
           class="fw-semibold">
        </p>

        <!-- Review -->
        <div id="reviewSection"
             class="text-start mt-4">
        </div>

        <a href="{{ url_for('upload') }}"
           class="btn btn-primary mt-4">

            Try New Topic

        </a>

    </div>

</div>

<!-- Quiz Data -->
<script id="quiz-data"
        type="application/json">

{{ questions | tojson }}

</script>

<script>
    const quizQuestions =
        JSON.parse(
            document.getElementById("quiz-data").textContent
        );
</script>

{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static',
filename='js/quiz.js') }}"></script>
{% endblock %}
